  #         *Description:* {{ .Annotations.description }}
  #         {{ end }}
  #       send_resolved: true

# Inhibition rules - prevent duplicate notifications
inhibit_rules:
  # Inhibit warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # Inhibit info if warning is firing
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'instance']
