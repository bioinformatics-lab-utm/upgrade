    #   - to: '${ALERT_EMAIL_TO}'
    #     send_resolved: true
    #     headers:
    #       Subject: '⚠️ Pipeline Alert: {{ .GroupLabels.alertname }}'

  # Infrastructure alerts (email disabled)
  - name: 'infrastructure-alerts'
    # email_configs:
    #   - to: '${ALERT_EMAIL_TO}'
    #     send_resolved: true
    #     headers:
    #       Subject: '🔧 Infrastructure Alert: {{ .GroupLabels.alertname }}'

  # Slack receiver (optional - uncomment to use)
  # - name: 'slack-receiver'
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '#alerts'
  #       title: '{{ .GroupLabels.alertname }}'
  #       text: |
  #         *Alert:* {{ .GroupLabels.alertname }}
