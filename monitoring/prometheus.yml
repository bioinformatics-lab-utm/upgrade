# Prometheus configuration for UPGRADE project
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'upgrade-production'
    environment: 'prod'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # MinIO metrics
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ['minio:9000']

  # Sanic backend (if using prometheus_client)
  - job_name: 'sanic_backend'
    static_configs:
      - targets: ['sanic-backend:8000']
    metrics_path: '/metrics'

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kafka exporter (optional)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # RQ (Redis Queue) dashboard
  - job_name: 'rq'
    static_configs:
      - targets: ['rq-dashboard:9181']
