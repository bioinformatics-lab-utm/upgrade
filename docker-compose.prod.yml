# =============================================================================
# UPGRADE Platform - Production Docker Compose Configuration
# =============================================================================
# Domain: upgrade.utm.md
# Environment: Production
# Features: SSL, Vault, Monitoring, High Availability
# =============================================================================

version: '3.8'

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  upgrade_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  
  monitoring_network:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  vault_data:
    driver: local
  vault_logs:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local

# =============================================================================
# SERVICES
# =============================================================================
services:
  
  # ===========================================================================
  # REVERSE PROXY & SSL
  # ===========================================================================
  
  nginx:
    image: nginx:1.25-alpine
    container_name: upgrade_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/upgrade.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - ./web-dashboard/frontend/build:/var/www/upgrade/frontend:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      web-backend:
        condition: service_healthy
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  
  # Certificate renewal (sidecar)
  certbot:
    image: certbot/certbot:v2.7.4
    container_name: upgrade_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - upgrade_network
    depends_on:
      - nginx
  
  # ===========================================================================
  # APPLICATION SERVICES
  # ===========================================================================
  
  web-backend:
    image: ghcr.io/utm-upgrade/upgrade/backend:${IMAGE_TAG:-latest}
    container_name: upgrade_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ENV=production
      - DOMAIN=upgrade.utm.md
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SENTRY_DSN=${SENTRY_DSN}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/data:ro
      - ./results:/results
      - ./logs/backend:/app/logs
      - ./nextflow:/nextflow:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "10"
  
  web-frontend:
    image: ghcr.io/utm-upgrade/upgrade/frontend:${IMAGE_TAG:-latest}
    container_name: upgrade_frontend
    restart: unless-stopped
    volumes:
      - ./web-dashboard/frontend/build:/app/build
    networks:
      - upgrade_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
  
  rq-worker:
    image: ghcr.io/utm-upgrade/upgrade/backend:${IMAGE_TAG:-latest}
    container_name: upgrade_rq_worker
    restart: unless-stopped
    command: python -m rq.cli worker pipeline_queue --url redis://:${REDIS_PASSWORD}@redis:6379/0
    environment:
      - ENV=production
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - NEXTFLOW_DIR=/nextflow
      - RESULTS_DIR=/results
      - DATA_DIR=/data
      - WORK_DIR=/nextflow/work
    volumes:
      - ./data:/data
      - ./results:/results
      - ./nextflow:/nextflow
      - ./logs/worker:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - upgrade_network
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "10"
  
  # ===========================================================================
  # DATABASE SERVICES
  # ===========================================================================
  
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: upgrade_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-upgrade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-upgrade_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upgrade} -d ${POSTGRES_DB:-upgrade_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  
  redis:
    image: redis:7-alpine
    container_name: upgrade_redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  # ===========================================================================
  # OBJECT STORAGE
  # ===========================================================================
  
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: upgrade_minio
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  
  # ===========================================================================
  # SECRETS MANAGEMENT
  # ===========================================================================
  
  vault:
    image: hashicorp/vault:1.15
    container_name: upgrade_vault
    restart: unless-stopped
    expose:
      - "8200"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - VAULT_DISABLE_MLOCK=true
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    cap_add:
      - IPC_LOCK
    command: server
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8200/v1/sys/health?standbyok=true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  # ===========================================================================
  # MESSAGE STREAMING
  # ===========================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: upgrade_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: upgrade_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  
  # ===========================================================================
  # MONITORING & OBSERVABILITY
  # ===========================================================================
  
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: upgrade_prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - upgrade_network
      - monitoring_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  grafana:
    image: grafana/grafana:10.2.2
    container_name: upgrade_grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://upgrade.utm.md/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - upgrade_network
      - monitoring_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: upgrade_alertmanager
    restart: unless-stopped
    expose:
      - "9093"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_SERVICE_KEY=${PAGERDUTY_SERVICE_KEY:-}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat /etc/alertmanager/alertmanager.template.yml \
          | sed "s|\$${SLACK_WEBHOOK_URL}|$$SLACK_WEBHOOK_URL|g" \
          | sed "s|\$${PAGERDUTY_SERVICE_KEY}|$$PAGERDUTY_SERVICE_KEY|g" \
          > /tmp/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager
    networks:
      - upgrade_network
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  loki:
    image: grafana/loki:2.9.2
    container_name: upgrade_loki
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - upgrade_network
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  promtail:
    image: grafana/promtail:2.9.2
    container_name: upgrade_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - ./logs:/app/logs:ro
      - nginx_logs:/var/log/nginx:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - upgrade_network
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
  # ===========================================================================
  # EXPORTERS
  # ===========================================================================
  
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: upgrade_node_exporter
    restart: unless-stopped
    expose:
      - "9100"
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
  
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: upgrade_postgres_exporter
    restart: unless-stopped
    expose:
      - "9187"
    environment:
      - DATA_SOURCE_URI=postgres:5432/upgrade_db?sslmode=disable
      - DATA_SOURCE_USER=${POSTGRES_USER:-upgrade}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - upgrade_network
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
  
  redis-exporter:
    image: oliver006/redis_exporter:v1.56.0
    container_name: upgrade_redis_exporter
    restart: unless-stopped
    expose:
      - "9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - upgrade_network
      - monitoring_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
  
  # ===========================================================================
  # BACKUP SERVICES
  # ===========================================================================
  
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: upgrade_postgres_backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-upgrade_db}
      - POSTGRES_USER=${POSTGRES_USER:-upgrade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z6 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups/postgres:/backups
    depends_on:
      - postgres
    networks:
      - upgrade_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  
