name: upgrade

services:
  # ===========================================
  # DATABASE SERVICES
  # ===========================================
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/
    ports:
      - "127.0.0.1:5433:5432"  # Expose on localhost:5433 only (not externally)
    networks:
      - upgrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}

  pgadmin:
    image: dpage/pgadmin4:8.0
    container_name: ${COMPOSE_PROJECT_NAME}_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:${PGADMIN_EXTERNAL_PORT}:80"
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ===========================================
  # CACHE SERVICE
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:${REDIS_EXTERNAL_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - upgrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}

  # ===========================================
  # OBJECT STORAGE
  # ===========================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ${COMPOSE_PROJECT_NAME}_minio
    networks: [upgrade_network]
    ports:
      - "127.0.0.1:${MINIO_API_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./backups/minio:/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    restart: unless-stopped

  # ===========================================
  # MESSAGE BROKER
  # ===========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ${COMPOSE_PROJECT_NAME}_zookeeper
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'srvr' | nc localhost ${ZOOKEEPER_CLIENT_PORT} | grep -q Mode"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - upgrade_network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ${COMPOSE_PROJECT_NAME}_kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - upgrade_network
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: ${COMPOSE_PROJECT_NAME}_kafka_ui
    ports:
      - "127.0.0.1:${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTERS_0_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS}
    networks:
      - upgrade_network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # BACKUP SERVICES
  # ===========================================
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_backup
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z9 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups/postgres:/backups
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  # ===========================================
  # WEB DASHBOARD (SANIC + REACT)
  # ===========================================
  
  web-backend:
    build:
      context: ./web-dashboard/backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_web_backend
    user: "1000:999"
    ports:
      - "8000:8000"
    environment:
    - ENVIRONMENT=development
    - POSTGRES_HOST=${POSTGRES_HOST}
    - POSTGRES_PORT=${POSTGRES_PORT}
    - POSTGRES_DB=${POSTGRES_DB}
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - MINIO_ENDPOINT=minio:${MINIO_API_PORT:-9000}
    - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
    - MINIO_ROOT_USER=${MINIO_ROOT_USER}
    - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    - REDIS_HOST=${REDIS_HOST}
    - REDIS_PORT=${REDIS_PORT}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - SANIC_PORT=${SANIC_PORT}
    - DEBUG=${SANIC_DEBUG}
    - AUTO_RELOAD=${SANIC_AUTO_RELOAD}
    - FRONTEND_URL=http://localhost:${GEO_DASHBOARD_FRONTEND_PORT}
    - JWT_SECRET=${JWT_SECRET}
    - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://100.72.39.49:3000}

    volumes:
      - ./web-dashboard/backend:/app
      - /data:/data
      - ./data/kraken2_db:/kraken2_db:ro  # Kraken2 database
      - ./results:/results  # Pipeline results
      - ./nextflow:/nextflow:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker socket (read-only)
      - /tmp:/tmp  # Isolated shared temp volume
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # P1 FIX: Graceful shutdown allows running pipelines to complete
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  web-frontend:
    build:
      context: ./web-dashboard/frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_web_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=
    networks:
      - upgrade_network
    depends_on:
      - web-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  rq-worker:
    build:
      context: ./web-dashboard/backend
      dockerfile: Dockerfile
    container_name: upgrade_rq_worker
    user: "1000:988"
    entrypoint: ["python", "/app/worker_init.py"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ENDPOINT=minio:${MINIO_API_PORT:-9000}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RQ_QUEUE_NAME=pipeline-queue
      - RQ_JOB_TIMEOUT=43200
      - DOCKER_UID=1000
      - DOCKER_GID=988
      - WORK_DIR=/tmp/nf-work
    volumes:
      - ./web-dashboard/backend:/app
      - /data:/data
      - ./results:/results
      - ./nextflow:/nextflow:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp:/tmp
    restart: unless-stopped
    networks:
      - upgrade_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; r = redis.Redis(host='$${REDIS_HOST}', port=$${REDIS_PORT}, password='$${REDIS_PASSWORD}'); r.ping()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"


# ===========================================
# NETWORKS
# ===========================================
networks:
  upgrade_network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_network

# ===========================================
# PERSISTENT VOLUMES
# ===========================================
volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}_postgres_data
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME}_pgadmin_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME}_redis_data
  minio_data:
    name: ${COMPOSE_PROJECT_NAME}_minio_data
  kafka_data:
    name: ${COMPOSE_PROJECT_NAME}_kafka_data
  zookeeper_data:
    name: ${COMPOSE_PROJECT_NAME}_zookeeper_data
  zookeeper_logs:
    name: ${COMPOSE_PROJECT_NAME}_zookeeper_logs
