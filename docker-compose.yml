name: upgrade

services:
  # ===========================================
  # WEATHER API SERVICE
  # ===========================================
  open-meteo:
    image: public.ecr.aws/w5w8t1y7/openmeteo:latest
    container_name: ${COMPOSE_PROJECT_NAME}_open_meteo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${OPEN_METEO_PORT}/v1/forecast?latitude=47&longitude=28&current_weather=true"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    ports:
      - "0.0.0.0:${OPEN_METEO_PORT}:8080"
    volumes:
      - ./open-meteo/config:/app/config
      - open_meteo_data:/app/data
    networks:
      - upgrade_network
    restart: unless-stopped

  # ===========================================
  # DATABASE SERVICES
  # ===========================================
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/
    ports:
      - "127.0.0.1:${POSTGRES_EXTERNAL_PORT}:5432"
    networks:
      - upgrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}

  pgadmin:
    image: dpage/pgadmin4:8.0
    container_name: ${COMPOSE_PROJECT_NAME}_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:${PGADMIN_EXTERNAL_PORT}:80"
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ===========================================
  # CACHE SERVICE
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:${REDIS_EXTERNAL_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - upgrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}

  # ===========================================
  # OBJECT STORAGE
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio
    networks: [upgrade_network]
    ports:
      - "127.0.0.1:${MINIO_API_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./backups/minio:/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    restart: unless-stopped

  # ===========================================
  # MESSAGE BROKER
  # ===========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ${COMPOSE_PROJECT_NAME}_zookeeper
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'srvr' | nc localhost ${ZOOKEEPER_CLIENT_PORT} | grep -q Mode"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - upgrade_network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ${COMPOSE_PROJECT_NAME}_kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - upgrade_network
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ${COMPOSE_PROJECT_NAME}_kafka_ui
    ports:
      - "127.0.0.1:${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTERS_0_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS}
    networks:
      - upgrade_network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # DATA PROCESSING SERVICES
  # ===========================================
  weather-producer:
    build:
      context: ./kafka/producer
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_weather_producer
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f weather_producer || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      kafka:
        condition: service_healthy
      open-meteo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      OPEN_METEO_URL: ${OPEN_METEO_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      COLLECTION_INTERVAL_MINUTES: ${COLLECTION_INTERVAL_MINUTES}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./logs:/app/logs
    networks:
      - upgrade_network
    restart: unless-stopped

  weather-consumer:
    build:
      context: ./kafka/consumer
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_weather_consumer
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f weather_consumer || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:${MINIO_API_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./logs:/app/logs
    networks:
      - upgrade_network
    restart: unless-stopped

  # ===========================================
  # BACKUP SERVICES
  # ===========================================
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_backup
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z9 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups/postgres:/backups
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # MONITORING SERVICES
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ${COMPOSE_PROJECT_NAME}_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - upgrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ${COMPOSE_PROJECT_NAME}_alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    environment:
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-${SMTP_FROM_EMAIL}}
    networks:
      - upgrade_network
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ${COMPOSE_PROJECT_NAME}_grafana
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - upgrade_network
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: ${COMPOSE_PROJECT_NAME}_node_exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - upgrade_network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: ${COMPOSE_PROJECT_NAME}_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - upgrade_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # WEB DASHBOARD (SANIC + REACT)
  # ===========================================
  
  web-backend:
    build:
      context: ./web-dashboard/backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_web_backend
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ENDPOINT=minio:${MINIO_API_PORT:-9000}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SANIC_PORT=8000
      - DEBUG=false
      - AUTO_RELOAD=false
      # JWT Authentication
      - JWT_SECRET=${JWT_SECRET}
      # Email Verification Settings (SMTP)
      - EMAIL_PROVIDER=smtp
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./web-dashboard/backend:/app
      - /data:/data
      - ./results:/results  # Pipeline results
      - ./nextflow:/nextflow:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for Nextflow
      - /tmp:/tmp  # Shared temp directory
    networks:
      - upgrade_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-frontend:
    build:
      context: ./web-dashboard/frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_web_frontend
    ports:
      - "0.0.0.0:3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - upgrade_network
    depends_on:
      - web-backend
    restart: unless-stopped

# ===========================================
# NETWORKS
# ===========================================
networks:
  upgrade_network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_network

# ===========================================
# PERSISTENT VOLUMES
# ===========================================
volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}_postgres_data
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME}_pgadmin_data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME}_redis_data
  minio_data:
    name: ${COMPOSE_PROJECT_NAME}_minio_data
  kafka_data:
    name: ${COMPOSE_PROJECT_NAME}_kafka_data
  zookeeper_data:
    name: ${COMPOSE_PROJECT_NAME}_zookeeper_data
  zookeeper_logs:
    name: ${COMPOSE_PROJECT_NAME}_zookeeper_logs
  open_meteo_data:
    name: ${COMPOSE_PROJECT_NAME}_open_meteo_data
  prometheus_data:
    name: ${COMPOSE_PROJECT_NAME}_prometheus_data
  alertmanager_data:
    name: ${COMPOSE_PROJECT_NAME}_alertmanager_data
  grafana_data:
    name: ${COMPOSE_PROJECT_NAME}_grafana_data