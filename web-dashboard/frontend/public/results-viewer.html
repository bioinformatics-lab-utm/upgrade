<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Results Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .content { padding: 30px; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-card label {
            display: block;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .info-card .value {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-completed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .status-running { background: #fff3cd; color: #856404; }
        
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        
        .file-list {
            display: grid;
            gap: 12px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .file-item:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(4px);
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .file-icon {
            font-size: 24px;
        }
        .file-details h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }
        .file-meta {
            font-size: 13px;
            color: #666;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 8px;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 Pipeline Results Viewer</h1>
            <p>View and download analysis results</p>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading pipeline results...</p>
            </div>
            
            <div id="content" style="display: none;">
                <!-- Info section -->
                <div class="info-grid" id="info-grid"></div>
                
                <!-- Reports section -->
                <div class="section">
                    <h2>�� Analysis Reports</h2>
                    <div class="file-list" id="reports-list"></div>
                </div>
                
                <!-- Results files section -->
                <div class="section">
                    <h2>📁 Result Files</h2>
                    <div class="file-list" id="files-list"></div>
                </div>
            </div>
            
            <div id="error" style="display: none;" class="error"></div>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pipelineId = urlParams.get('id') || '23';
        const API_URL = '';  // Relative URL for nginx proxy
        
        async function loadResults() {
            try {
                const response = await fetch(`${API_URL}/api/pipeline/runs/${pipelineId}`);
                if (!response.ok) throw new Error('Failed to load pipeline data');
                
                const data = await response.json();
                displayResults(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading results: ${error.message}`;
            }
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString();
        }
        
        function getStatusClass(status) {
            return `status-badge status-${status}`;
        }
        
        function getFileIcon(filename) {
            if (filename.endsWith('.html')) return '📊';
            if (filename.endsWith('.txt') || filename.endsWith('.log')) return '��';
            if (filename.endsWith('.fastq.gz') || filename.endsWith('.fasta.gz')) return '🧬';
            if (filename.endsWith('.png')) return '🖼️';
            if (filename.endsWith('.fa')) return '🧫';
            return '📁';
        }
        
        function displayResults(data) {
            // Info grid
            const infoHtml = `
                <div class="info-card">
                    <label>Pipeline ID</label>
                    <div class="value">#${data.id}</div>
                </div>
                <div class="info-card">
                    <label>Status</label>
                    <div class="value">
                        <span class="${getStatusClass(data.status)}">${data.status.toUpperCase()}</span>
                    </div>
                </div>
                <div class="info-card">
                    <label>Sample Code</label>
                    <div class="value">${data.sample.code}</div>
                </div>
                <div class="info-card">
                    <label>Completion Time</label>
                    <div class="value">${formatDate(data.completed_at)}</div>
                </div>
            `;
            document.getElementById('info-grid').innerHTML = infoHtml;
            
            // Separate reports and other files
            const reports = [];
            const otherFiles = [];
            
            data.result_files.forEach(file => {
                const isReport = file.name.includes('report') || file.name.includes('timeline') || 
                                file.name.includes('NanoPlot') || file.name.includes('trace');
                if (isReport) {
                    reports.push(file);
                } else {
                    otherFiles.push(file);
                }
            });
            
            // Display reports
            let reportsHtml = '';
            reports.forEach(file => {
                const icon = getFileIcon(file.name);
                const downloadUrl = `${API_URL}/api/pipeline/runs/${pipelineId}/files/${encodeURIComponent(file.path)}`;
                reportsHtml += `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-icon">${icon}</div>
                            <div class="file-details">
                                <h3>${file.name}</h3>
                                <div class="file-meta">${formatBytes(file.size)} • ${formatDate(file.modified)}</div>
                            </div>
                        </div>
                        <div>
                            <a href="${downloadUrl}" target="_blank" class="btn btn-primary">View</a>
                            <a href="${downloadUrl}?download=1" class="btn btn-secondary">Download</a>
                        </div>
                    </div>
                `;
            });
            document.getElementById('reports-list').innerHTML = reportsHtml || '<p>No reports available</p>';
            
            // Display other files
            let filesHtml = '';
            otherFiles.slice(0, 50).forEach(file => {
                const icon = getFileIcon(file.name);
                const downloadUrl = `${API_URL}/api/pipeline/runs/${pipelineId}/files/${encodeURIComponent(file.path)}`;
                filesHtml += `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-icon">${icon}</div>
                            <div class="file-details">
                                <h3>${file.name}</h3>
                                <div class="file-meta">${file.path} • ${formatBytes(file.size)}</div>
                            </div>
                        </div>
                        <div>
                            <a href="${downloadUrl}?download=1" class="btn btn-primary">Download</a>
                        </div>
                    </div>
                `;
            });
            if (otherFiles.length > 50) {
                filesHtml += `<p>Showing 50 of ${otherFiles.length} files</p>`;
            }
            document.getElementById('files-list').innerHTML = filesHtml || '<p>No files available</p>';
        }
        
        // Load results on page load
        loadResults();
    </script>
</body>
</html>
